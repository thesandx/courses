<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCP Professional Data Engineer — Mock Exam</title>
<style>
  :root {
    --bg: #f4f6fa;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --blue: #1a73e8;
    --blue-dark: #174ea6;
    --green: #188038;
    --green-bg: #e6f4ea;
    --red: #d93025;
    --red-bg: #fce8e6;
    --amber-bg: #fef7e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
  }
  header {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue));
    color: #fff;
    padding: 18px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  header h1 { font-size: 1.05rem; font-weight: 600; flex: 1 1 260px; }
  header .stats { display: flex; gap: 18px; font-size: .85rem; align-items: center; }
  header .stats b { font-size: 1.05rem; }
  .pill { background: rgba(255,255,255,.16); border-radius: 999px; padding: 4px 14px; }
  #progressWrap { flex-basis: 100%; height: 6px; background: rgba(255,255,255,.25); border-radius: 3px; overflow: hidden; }
  #progressBar { height: 100%; width: 0; background: #8ab4f8; transition: width .3s; }

  .layout { display: flex; gap: 20px; max-width: 1200px; margin: 24px auto; padding: 0 20px; align-items: flex-start; }

  aside {
    flex: 0 0 250px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    position: sticky;
    top: 96px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
  }
  aside h2 { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 10px; }
  #palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  #palette button {
    aspect-ratio: 1;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    font-size: .72rem;
    cursor: pointer;
    color: var(--ink);
  }
  #palette button.current { outline: 2px solid var(--blue); outline-offset: 1px; font-weight: 700; }
  #palette button.right { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 600; }
  #palette button.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); font-weight: 600; }
  aside select {
    width: 100%; margin-bottom: 14px; padding: 8px; border-radius: 8px;
    border: 1px solid var(--line); font-size: .85rem; background: #fff; color: var(--ink);
  }
  aside .side-actions { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }

  main { flex: 1 1 auto; min-width: 0; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 26px 28px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .qmeta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .qnum { font-weight: 700; color: var(--blue-dark); }
  .tag {
    font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
    background: #e8f0fe; color: var(--blue-dark); border-radius: 999px; padding: 3px 12px;
  }
  .qtext { font-size: 1.02rem; margin-bottom: 20px; white-space: pre-line; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex; gap: 12px; align-items: flex-start; text-align: left;
    border: 1.5px solid var(--line); border-radius: 10px; padding: 12px 16px;
    background: #fff; cursor: pointer; font-size: .95rem; color: var(--ink);
    transition: border-color .15s, background .15s; width: 100%; font-family: inherit; line-height: 1.5;
  }
  .opt:hover:not(:disabled) { border-color: var(--blue); background: #f8fbff; }
  .opt:disabled { cursor: default; }
  .opt .letter {
    flex: 0 0 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; color: var(--muted);
  }
  .opt.correct { border-color: var(--green); background: var(--green-bg); }
  .opt.correct .letter { border-color: var(--green); background: var(--green); color: #fff; }
  .opt.incorrect { border-color: var(--red); background: var(--red-bg); }
  .opt.incorrect .letter { border-color: var(--red); background: var(--red); color: #fff; }
  .opt.dim { opacity: .55; }

  .verdict { margin-top: 18px; font-weight: 700; font-size: .95rem; display: none; }
  .verdict.right { color: var(--green); display: block; }
  .verdict.wrong { color: var(--red); display: block; }
  .explain {
    display: none; margin-top: 12px; border-left: 4px solid var(--blue);
    background: #f8fbff; border-radius: 0 10px 10px 0; padding: 14px 18px; font-size: .92rem;
  }
  .explain.show { display: block; }
  .explain h3 { font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; color: var(--blue-dark); margin-bottom: 6px; }

  .nav { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
  .btn {
    border: none; border-radius: 8px; padding: 10px 22px; font-size: .9rem; font-weight: 600;
    cursor: pointer; background: var(--blue); color: #fff; font-family: inherit;
  }
  .btn:hover { background: var(--blue-dark); }
  .btn.ghost { background: #fff; color: var(--blue-dark); border: 1px solid var(--line); }
  .btn.ghost:hover { background: #f1f5fb; }
  .btn:disabled { opacity: .4; cursor: default; }

  /* results */
  #results { display: none; }
  #results .card { text-align: center; padding: 40px; }
  .score-big { font-size: 3rem; font-weight: 800; margin: 8px 0; }
  .score-pass { color: var(--green); }
  .score-fail { color: var(--red); }
  #domainBreakdown { margin: 26px auto 0; max-width: 560px; text-align: left; }
  #domainBreakdown .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: .88rem; }
  #domainBreakdown .row .name { flex: 0 0 220px; }
  #domainBreakdown .bar { flex: 1; height: 10px; background: var(--line); border-radius: 5px; overflow: hidden; }
  #domainBreakdown .bar i { display: block; height: 100%; background: var(--green); }
  #domainBreakdown .pct { flex: 0 0 70px; text-align: right; color: var(--muted); }

  @media (max-width: 860px) {
    .layout { flex-direction: column; }
    aside { position: static; flex-basis: auto; width: 100%; max-height: none; }
    #palette { grid-template-columns: repeat(10, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>☁️ Google Cloud Professional Data Engineer — Mock Exam</h1>
  <div class="stats">
    <span class="pill">Answered <b id="statAnswered">0</b>/<b id="statTotal">0</b></span>
    <span class="pill">Correct <b id="statCorrect">0</b></span>
    <span class="pill">Score <b id="statPct">–</b></span>
  </div>
  <div id="progressWrap"><div id="progressBar"></div></div>
</header>

<div class="layout">
  <aside>
    <h2>Domain filter</h2>
    <select id="domainFilter"><option value="">All domains</option></select>
    <h2>Questions</h2>
    <div id="palette"></div>
    <div class="side-actions">
      <button class="btn ghost" id="btnResults">Finish &amp; see results</button>
      <button class="btn ghost" id="btnReset">Reset exam</button>
    </div>
  </aside>

  <main>
    <div id="quiz" class="card">
      <div class="qmeta">
        <span class="qnum" id="qnum"></span>
        <span class="tag" id="qtag"></span>
      </div>
      <div class="qtext" id="qtext"></div>
      <div class="options" id="qopts"></div>
      <div class="verdict" id="qverdict"></div>
      <div class="explain" id="qexplain"><h3>Explanation</h3><div id="qexplainBody"></div></div>
      <div class="nav">
        <button class="btn ghost" id="btnPrev">← Previous</button>
        <button class="btn" id="btnNext">Next →</button>
      </div>
    </div>

    <div id="results">
      <div class="card">
        <h2>Exam complete</h2>
        <div class="score-big" id="finalScore"></div>
        <p id="finalMsg"></p>
        <p style="color:var(--muted); font-size:.85rem; margin-top:6px;">The real PDE exam pass mark is around 70%.</p>
        <div id="domainBreakdown"></div>
        <div style="margin-top:28px; display:flex; gap:12px; justify-content:center;">
          <button class="btn ghost" id="btnReview">Review answers</button>
          <button class="btn" id="btnRetake">Retake exam</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="questions.js"></script>
<script>
(function () {
  const STORAGE_KEY = "pde-mock-exam-v1";

  let order = QUESTIONS.map((_, i) => i);   // indexes into QUESTIONS, after filter
  let current = 0;
  // answers[questionIndex] = selected option index (persisted)
  let answers = {};

  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && typeof saved === "object") answers = saved;
  } catch (e) { /* fresh start */ }

  const $ = (id) => document.getElementById(id);

  // ---- domain filter ----
  const domains = [...new Set(QUESTIONS.map(q => q.d))];
  for (const d of domains) {
    const o = document.createElement("option");
    o.value = d; o.textContent = d;
    $("domainFilter").appendChild(o);
  }
  $("domainFilter").addEventListener("change", function () {
    const d = this.value;
    order = QUESTIONS.map((_, i) => i).filter(i => !d || QUESTIONS[i].d === d);
    current = 0;
    buildPalette();
    showResultsView(false);
    render();
  });

  // ---- palette ----
  function buildPalette() {
    const pal = $("palette");
    pal.innerHTML = "";
    order.forEach((qi, pos) => {
      const b = document.createElement("button");
      b.textContent = pos + 1;
      b.addEventListener("click", () => { current = pos; showResultsView(false); render(); });
      pal.appendChild(b);
    });
  }

  function paintPalette() {
    const pal = $("palette").children;
    order.forEach((qi, pos) => {
      const b = pal[pos];
      b.className = "";
      if (answers[qi] !== undefined) {
        b.classList.add(answers[qi] === QUESTIONS[qi].a ? "right" : "wrong");
      }
      if (pos === current) b.classList.add("current");
    });
  }

  // ---- stats ----
  function refreshStats() {
    const total = order.length;
    let answered = 0, correct = 0;
    for (const qi of order) {
      if (answers[qi] !== undefined) {
        answered++;
        if (answers[qi] === QUESTIONS[qi].a) correct++;
      }
    }
    $("statTotal").textContent = total;
    $("statAnswered").textContent = answered;
    $("statCorrect").textContent = correct;
    $("statPct").textContent = answered ? Math.round(100 * correct / answered) + "%" : "–";
    $("progressBar").style.width = total ? (100 * answered / total) + "%" : "0";
    return { total, answered, correct };
  }

  // ---- question rendering ----
  function render() {
    const qi = order[current];
    const q = QUESTIONS[qi];
    $("qnum").textContent = "Question " + (current + 1) + " of " + order.length;
    $("qtag").textContent = q.d;
    $("qtext").textContent = q.q;

    const opts = $("qopts");
    opts.innerHTML = "";
    const answered = answers[qi] !== undefined;

    q.o.forEach((text, oi) => {
      const b = document.createElement("button");
      b.className = "opt";
      b.innerHTML = '<span class="letter">' + "ABCDE"[oi] + "</span><span></span>";
      b.lastChild.textContent = text;
      if (answered) {
        b.disabled = true;
        if (oi === q.a) b.classList.add("correct");
        else if (oi === answers[qi]) b.classList.add("incorrect");
        else b.classList.add("dim");
      } else {
        b.addEventListener("click", () => selectAnswer(qi, oi));
      }
      opts.appendChild(b);
    });

    const verdict = $("qverdict");
    const explain = $("qexplain");
    verdict.className = "verdict";
    explain.className = "explain";
    if (answered) {
      const right = answers[qi] === q.a;
      verdict.textContent = right
        ? "✓ Correct!"
        : "✗ Incorrect — the correct answer is " + "ABCDE"[q.a] + ".";
      verdict.classList.add(right ? "right" : "wrong");
      $("qexplainBody").textContent = q.e;
      explain.classList.add("show");
    }

    $("btnPrev").disabled = current === 0;
    $("btnNext").textContent = current === order.length - 1 ? "Finish ✓" : "Next →";

    refreshStats();
    paintPalette();
  }

  function selectAnswer(qi, oi) {
    answers[qi] = oi;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(answers));
    render();
  }

  // ---- navigation ----
  $("btnPrev").addEventListener("click", () => { if (current > 0) { current--; render(); } });
  $("btnNext").addEventListener("click", () => {
    if (current < order.length - 1) { current++; render(); }
    else showResults();
  });
  document.addEventListener("keydown", (e) => {
    if ($("results").style.display === "block") return;
    if (e.key === "ArrowRight" && current < order.length - 1) { current++; render(); }
    if (e.key === "ArrowLeft" && current > 0) { current--; render(); }
    const k = "abcde".indexOf(e.key.toLowerCase());
    const qi = order[current];
    if (k >= 0 && k < QUESTIONS[qi].o.length && answers[qi] === undefined) selectAnswer(qi, k);
  });

  // ---- results ----
  function showResultsView(on) {
    $("results").style.display = on ? "block" : "none";
    $("quiz").style.display = on ? "none" : "block";
  }

  function showResults() {
    const { total, correct } = refreshStats();
    const pct = total ? Math.round(100 * correct / total) : 0;
    const pass = pct >= 70;
    const fs = $("finalScore");
    fs.textContent = pct + "%  (" + correct + "/" + total + ")";
    fs.className = "score-big " + (pass ? "score-pass" : "score-fail");
    $("finalMsg").textContent = pass
      ? "🎉 You'd likely PASS — great job. Review the questions you missed to lock it in."
      : "Keep going — review the explanations for the questions you missed and retake.";

    // per-domain breakdown
    const byDomain = {};
    for (const qi of order) {
      const q = QUESTIONS[qi];
      byDomain[q.d] = byDomain[q.d] || { total: 0, correct: 0 };
      byDomain[q.d].total++;
      if (answers[qi] === q.a) byDomain[q.d].correct++;
    }
    const wrap = $("domainBreakdown");
    wrap.innerHTML = "";
    for (const [d, s] of Object.entries(byDomain)) {
      const p = s.total ? Math.round(100 * s.correct / s.total) : 0;
      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML =
        '<span class="name"></span>' +
        '<span class="bar"><i style="width:' + p + '%"></i></span>' +
        '<span class="pct">' + p + "% (" + s.correct + "/" + s.total + ")</span>";
      row.firstChild.textContent = d;
      wrap.appendChild(row);
    }
    showResultsView(true);
  }

  $("btnResults").addEventListener("click", showResults);
  $("btnReview").addEventListener("click", () => { current = 0; showResultsView(false); render(); });

  function reset() {
    answers = {};
    localStorage.removeItem(STORAGE_KEY);
    current = 0;
    showResultsView(false);
    render();
  }
  $("btnReset").addEventListener("click", () => { if (confirm("Clear all your answers and start over?")) reset(); });
  $("btnRetake").addEventListener("click", reset);

  buildPalette();
  render();
})();
</script>
</body>
</html>
